<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>La Isla 3D</title><style>
*{box-sizing:border-box}html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;font-family:Avenir Next,Arial,sans-serif;background:#062f35;color:#f5ead2}button{font:inherit;cursor:pointer;touch-action:manipulation}canvas{display:block;width:100%;height:100%;touch-action:none}.screen{position:fixed;inset:0;z-index:5;display:grid;place-items:center;background:radial-gradient(circle at 80% 20%,#ef743544,transparent 440px),linear-gradient(145deg,#062f35,#0b4b54)}.box{width:min(1100px,92vw);padding:30px;border:1px solid #ffffff22;border-radius:28px;background:#062f35dd;backdrop-filter:blur(12px);box-shadow:0 30px 90px #0008}h1{font-family:Georgia,serif;font-size:clamp(54px,10vw,118px);line-height:.84;margin:0 0 18px}.row{display:flex;gap:12px;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:14px 21px;background:#ef7435;color:#062f35;font-weight:900}.ghost{background:#ffffff14;color:#fff;border:1px solid #ffffff33}#select{display:none;position:fixed;inset:0;z-index:5;overflow:auto;padding:24px;background:#062f35}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{position:relative;border:1px solid #ffffff22;border-radius:20px;padding:18px;min-height:224px;background:linear-gradient(160deg,#ffffff12,#00000022);overflow:hidden}.card:after{content:"";position:absolute;right:-34px;bottom:-54px;width:175px;height:175px;border-radius:50%;background:var(--c);opacity:.45}.card b{display:block;font-size:30px;font-family:Georgia,serif}.card p{color:#f5ead2aa;line-height:1.4;min-height:64px}.card small{color:#f5c17d;font-weight:900;text-transform:uppercase;font-size:11px}#hud{display:none;position:fixed;inset:0;z-index:3;pointer-events:none}.panel{position:absolute;top:14px;left:14px;border:1px solid #ffffff28;border-radius:18px;background:#05282dcc;padding:12px 15px;backdrop-filter:blur(10px);box-shadow:0 12px 30px #0005}#mission{left:50%;transform:translateX(-50%);min-width:min(520px,90vw)}#right{left:auto;right:14px;display:grid;gap:8px}#right button,.action{pointer-events:auto;border:1px solid #ffffff28;border-radius:15px;background:#05282dcc;color:#fff;padding:12px 14px;font-weight:900}#joy{position:absolute;left:18px;bottom:18px;width:120px;height:120px;border-radius:50%;border:1px solid #ffffff55;background:#05282d88;pointer-events:auto}#knob{position:absolute;left:36px;top:36px;width:48px;height:48px;border-radius:50%;background:#ef7435}#actions{position:absolute;right:18px;bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:8px;pointer-events:auto}#actions button{border:1px solid #ffffff28;border-radius:18px;background:#05282dcc;color:#fff;padding:16px 18px;font-weight:900}#actions button:last-child{grid-column:1/3;background:#ef7435;color:#062f35}#toast{position:fixed;left:50%;bottom:155px;transform:translateX(-50%);z-index:10;background:#f5ead2;color:#062f35;border-radius:999px;padding:12px 18px;font-weight:900;display:none}#loading{position:fixed;inset:0;display:none;place-items:center;background:#062f35;z-index:9;text-align:center}.bar{width:270px;height:7px;border-radius:99px;background:#ffffff22;overflow:hidden}.bar i{display:block;height:100%;width:0;background:#ef7435;transition:.3s}@media(max-width:760px){#mission{top:82px}.panel{font-size:12px}#joy{width:104px;height:104px}#knob{left:31px;top:31px;width:42px;height:42px}}
</style><script type="importmap">{"imports":{"three":"https://esm.sh/three@0.160.0","three/addons/":"https://esm.sh/three@0.160.0/examples/jsm/"}}</script></head><body><div id="app"></div>
<section id="home" class="screen"><div class="box"><p style="color:#ef7435;font-weight:900;letter-spacing:.25em">ISLA DEL BURGUILLO · ÁVILA</p><h1>LA ISLA<br>3D</h1><p>Juego 3D del festival con personajes humanos, barra, pista, chillout, camping, barca, DJs, water, pole dance y música.</p><div class="row"><button class="btn" id="start">Nueva partida</button><button class="btn ghost" id="resume">Continuar</button><button class="btn ghost" id="music">Música</button></div></div></section>
<section id="select"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:18px"><h2>Elige personaje humano 3D</h2><button class="btn ghost" id="back">Volver</button></div><div class="grid" id="cards"></div></section>
<div id="loading"><div><h2>Cargando La Isla 3D…</h2><div class="bar"><i id="loadbar"></i></div></div></div>
<div id="hud"><div class="panel"><small id="role"></small><b id="pname"></b></div><div class="panel" id="mission"><small>Misión</small><b>Recoge recuerdos y encuentra la llave del water</b><div class="bar"><i id="progress"></i></div><small id="pc"></small></div><div class="panel" id="right"><button id="map">Mapa</button><button id="inv">Inventario</button><button id="pause">Pausa</button></div><div id="joy"><span id="knob"></span></div><div id="actions"><button id="jump">Saltar</button><button id="open">Abrir</button><button id="special">Especial</button></div></div><div id="toast"></div>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
const $=id=>document.getElementById(id),base='https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/';
const chars=[
{id:'lala',name:'Lala',sex:'mujer',desc:'Torbellino · baile pavo real',model:'Michelle.glb',color:0xef7435,accent:0x19a0a3},
{id:'lety',name:'Lety',sex:'mujer',desc:'Mi chillout, mis normas',model:'Michelle.glb',color:0x0b5964,accent:0xf5ead2},
{id:'isa',name:'Isa',sex:'mujer',desc:'Llegó sábado y no perdió el tiempo',model:'Michelle.glb',color:0x2f8f83,accent:0xffd166},
{id:'patri',name:'Patri',sex:'mujer',desc:'Intensa, piripi y graciosísima',model:'Michelle.glb',color:0xc94f7c,accent:0xffd9ec},
{id:'luis',name:'Luis',sex:'hombre',desc:'Malagueño vacilón',model:'Soldier.glb',color:0x3568a8,accent:0xffc16b},
{id:'fran',name:'Fran',sex:'hombre',desc:'Calma y resurgir',model:'Soldier.glb',color:0x4f6b52,accent:0xd8e5b6},
{id:'clara',name:'Clara',sex:'mujer',desc:'Dueña de la pista',model:'Michelle.glb',color:0x8d5dd6,accent:0xf3dcff},
{id:'jesucristo',name:'Jesucristo',sex:'hombre',desc:'Pelazo y buen rollo',model:'Soldier.glb',color:0x7c4a36,accent:0xffd6b3},
{id:'aitor',name:'Aitor',sex:'hombre',desc:'Loquito desenjaulado',model:'Soldier.glb',color:0xd14e2f,accent:0xffe0bf}];
const items=[['papas','Papas revolconas',9,6],['llave','Llave del water',-12,9],['carpeta','Carpeta rosa · polvos mágicos',-6,7],['pistola','Pistola de agua',-3,10],['colchon','Colchón pinchado',-11,3.5],['barca','Barca',13,-10],['hamaca','Hamaca',-7,8],['pulsera','Pulsera cashless',-2,3]].map(i=>({id:i[0],label:i[1],pos:new THREE.Vector3(i[2],.35,i[3])}));
let scene,camera,renderer,clock,player,selected=localStorage.laislaChar||'lala',collected=JSON.parse(localStorage.laislaItems||'[]'),interactive=[],move={x:0,z:0},specialUntil=0,audioCtx,models={};
function setScreen(s){$('home').style.display=s==='home'?'grid':'none';$('select').style.display=s==='select'?'block':'none';$('hud').style.display=s==='game'?'block':'none'}function toast(t){$('toast').textContent=t;$('toast').style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').style.display='none',2200)}function save(){localStorage.laislaChar=selected;localStorage.laislaItems=JSON.stringify(collected)}
function music(){if(audioCtx){audioCtx.close();audioCtx=null;toast('Música parada');return}audioCtx=new (AudioContext||webkitAudioContext)();audioCtx.resume();let t=audioCtx.currentTime;function beat(){if(!audioCtx)return;let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=55;o.type='sine';g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.4,t+.015);g.gain.exponentialRampToValueAtTime(.0001,t+.18);o.connect(g).connect(audioCtx.destination);o.start(t);o.stop(t+.2);for(let i=0;i<4;i++){let s=audioCtx.createOscillator(),sg=audioCtx.createGain();s.type='sawtooth';s.frequency.value=[440,523,659,784][i];sg.gain.setValueAtTime(.0001,t+i*.125);sg.gain.exponentialRampToValueAtTime(.08,t+i*.125+.02);sg.gain.exponentialRampToValueAtTime(.0001,t+i*.125+.11);s.connect(sg).connect(audioCtx.destination);s.start(t+i*.125);s.stop(t+i*.125+.14)}t+=.5;setTimeout(beat,500)}beat();toast('Música activada')}
$('music').onclick=music;$('start').onclick=()=>setScreen('select');$('resume').onclick=()=>startGame(selected);$('back').onclick=()=>setScreen('home');
const cards=$('cards');chars.forEach(c=>{let d=document.createElement('article');d.className='card';d.style='--c:#'+c.color.toString(16).padStart(6,'0');d.innerHTML=`<small>${c.sex} · humano 3D</small><b>${c.name}</b><p>${c.desc}</p><button class="btn">Jugar con ${c.name}</button>`;d.querySelector('button').onclick=()=>startGame(c.id);cards.appendChild(d)});
async function loadModel(name){let url=base+name;if(models[url])return models[url].clone(true);const gltf=await new GLTFLoader().loadAsync(url);models[url]=gltf.scene;return gltf.scene.clone(true)}function fit(o,h=2.22){const b=new THREE.Box3().setFromObject(o),s=b.getSize(new THREE.Vector3()),k=h/Math.max(s.y,.01);o.scale.setScalar(k);const b2=new THREE.Box3().setFromObject(o),c=b2.getCenter(new THREE.Vector3());o.position.set(-c.x,-b2.min.y,-c.z);o.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true}})}function mat(c,r=.55,m=.08){return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m})}
function label(txt){const c=document.createElement('canvas');c.width=512;c.height=96;const x=c.getContext('2d');x.fillStyle='rgba(5,34,38,.9)';x.roundRect(8,8,496,80,26);x.fill();x.strokeStyle='#ef7435';x.lineWidth=4;x.stroke();x.fillStyle='#fff';x.font='bold 26px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(txt,256,50);let t=new THREE.CanvasTexture(c),s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true}));s.scale.set(2.5,.48,1);return s}
function acc(root,c){const g=new THREE.Group(),p=mat(c.color),a=mat(c.accent),hair=mat(0x2b1712),gold=mat(0xd8a94a);let add=(geo,m,x,y,z)=>{let o=new THREE.Mesh(geo,m);o.position.set(x,y,z);g.add(o);return o};if(c.id==='lala'){for(let i=0;i<7;i++){let an=-.8+i*.27;add(new THREE.CylinderGeometry(.012,.012,.65,8),p,Math.sin(an)*.22,1.85+Math.cos(an)*.14,-.13).rotation.z=-an;add(new THREE.SphereGeometry(.05,12,8),i%2?a:gold,Math.sin(an)*.43,2.08+Math.cos(an)*.17,-.14)}}if(c.id==='lety')add(new THREE.BoxGeometry(.25,.22,.1),p,.25,.95,.12);if(c.id==='luis')add(new THREE.TorusGeometry(.31,.02,8,46,4.6),mat(0xf4e8a8,.8,0),0,1.2,.09).rotation.z=.55;if(c.id==='jesucristo')for(let i=0;i<10;i++){let an=i/10*Math.PI*2;let l=add(new THREE.CapsuleGeometry(.035,.45,4,8),hair,Math.cos(an)*.16,1.72,Math.sin(an)*.12-.02);l.rotation.z=Math.cos(an)*.22}if(c.id==='aitor')add(new THREE.TorusGeometry(.25,.028,10,40,4.0),p,0,1.55,.03).rotation.z=-.42;root.add(g)}
function island(){const grass=mat(0x2f5e31,.8,0),land=new THREE.Mesh(new THREE.CylinderGeometry(18,20,1,80),grass);land.position.y=-.52;land.scale.z=.72;land.castShadow=land.receiveShadow=true;scene.add(land);const sand=new THREE.Mesh(new THREE.RingGeometry(12,20,80),mat(0xd8bb7b,.9,0));sand.rotation.x=-Math.PI/2;sand.position.y=.04;sand.scale.z=.72;scene.add(sand)}function prop(name,x,z,obj){obj.position.set(x,0,z);let l=label(name);l.position.y=2;obj.add(l);scene.add(obj)}function boxProp(n,x,z,c,w=1,h=.6,d=1){let g=new THREE.Group(),m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(c,.7,.05));m.position.y=h/2;g.add(m);prop(n,x,z,g)}
function buildScene(){boxProp('Barra + camareros + papas',9,6,0x9a5d32,5,1,1.1);boxProp('Zona chillout',-8,7,0x134d53,4,.35,3);boxProp('Escenario · DJ Bueno / DJ Malo',0,-14,0x111111,7,1.1,2);boxProp('Water La Moraleja',-12,9,0xf5ead2,1.4,1.8,1.2);boxProp('Tienda sin palos',-10,2,0xef7435,2,.7,2);boxProp('Colchón pinchado',-11,3.7,0x77c9c8,2,.12,1);boxProp('Barca',13,-10,0x8a4c2a,2.4,.35,.8);boxProp('Hamaca',-7,8,0xe8c574,2,.1,.6);let f=new THREE.Group();f.add(new THREE.Mesh(new THREE.CylinderGeometry(.7,.9,.25,36),mat(0xcfcac0)));f.add(new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,1,12),mat(0x8bd7ff,.3,0)));prop('Fuente',6,-7,f);let poleGroup=new THREE.Group(),pole=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,2.7,24),mat(0xbfc0c2,.25,.9));pole.position.y=1.35;poleGroup.add(pole);prop('Pole Dance',-5,-12,poleGroup);boxProp('La loca del festival',3,-11,0xe8b998,.45,1.8,.28)}
function itemMesh(it){let g=new THREE.Group(),m;if(it.id==='papas')m=new THREE.Mesh(new THREE.CylinderGeometry(.38,.42,.18,24),mat(0xc96b28));else if(it.id==='carpeta')m=new THREE.Mesh(new THREE.BoxGeometry(.7,.06,.48),mat(0xff8ccc));else if(it.id==='pistola')m=new THREE.Mesh(new THREE.BoxGeometry(.7,.18,.12),mat(0x28b8e8));else if(it.id==='llave')m=new THREE.Mesh(new THREE.TorusGeometry(.16,.035,8,24),mat(0xd8a94a,.4,.7));else m=new THREE.Mesh(new THREE.BoxGeometry(.45,.28,.45),mat(0xef7435));m.position.y=.45;g.add(m);const r=new THREE.Mesh(new THREE.TorusGeometry(.75,.025,8,36),new THREE.MeshBasicMaterial({color:0xffd17a}));r.rotation.x=Math.PI/2;r.position.y=.05;g.add(r);let l=label(it.label);l.position.y=1.4;g.add(l);g.position.copy(it.pos);g.userData=it;interactive.push(g);scene.add(g)}
async function addPerson(c,x,z,dance=false){try{let o=await loadModel(c.model);fit(o,2.05);acc(o,c);o.position.set(x,0,z);o.rotation.y=Math.PI;scene.add(o);o.userData.dance=dance;return o}catch(e){console.warn('modelo falló',c.name,e);const fallback=c.sex==='mujer'?'Michelle.glb':'Soldier.glb';if(c.model!==fallback){let o=await loadModel(fallback);fit(o,2.05);acc(o,c);o.position.set(x,0,z);o.rotation.y=Math.PI;scene.add(o);o.userData.dance=dance;return o}toast('Falla modelo '+c.name);return null}}
async function startGame(id){selected=id;save();if(!audioCtx)music();setScreen('game');$('loading').style.display='grid';$('loadbar').style.width='15%';await boot(chars.find(c=>c.id===id));$('loading').style.display='none'}
async function boot(c){scene=new THREE.Scene();scene.background=new THREE.Color(0x9ed7dc);camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,500);renderer=new THREE.WebGLRenderer({antialias:!matchMedia('(pointer:coarse)').matches});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.3));renderer.shadowMap.enabled=true;$('app').innerHTML='';$('app').appendChild(renderer.domElement);clock=new THREE.Clock();scene.add(new THREE.HemisphereLight(0xeaf7ff,0x315a33,1.2));let sun=new THREE.DirectionalLight(0xffffff,2.2);sun.position.set(7,12,5);sun.castShadow=true;scene.add(sun);let water=new THREE.Mesh(new THREE.PlaneGeometry(300,300),mat(0x176174,.45,0));water.rotation.x=-Math.PI/2;water.position.y=-1.2;scene.add(water);island();buildScene();items.forEach(itemMesh);$('loadbar').style.width='45%';player=new THREE.Group();scene.add(player);let main=await addPerson(c,0,0,false);if(main){player.add(main);main.position.set(0,0,0)}$('loadbar').style.width='70%';for(let i=0;i<7;i++)await addPerson(chars[i%chars.length],-3+i,-12+Math.sin(i)*.6,true);await addPerson(chars[5],8,6,false);await addPerson(chars[2],11,6,false);await addPerson(chars[8],-3,6,true);$('loadbar').style.width='100%';$('pname').textContent=c.name;$('role').textContent=c.desc;updateHud();animate()}
function updateHud(){let n=items.filter(i=>collected.includes(i.id)).length;$('progress').style.width=(n/items.length*100)+'%';$('pc').textContent=n+' de '+items.length}function collect(){let near=interactive.filter(o=>!collected.includes(o.userData.id)).sort((a,b)=>a.position.distanceTo(player.position)-b.position.distanceTo(player.position))[0];if(near&&near.position.distanceTo(player.position)<2.5){collected.push(near.userData.id);near.visible=false;toast('Recogido: '+near.userData.label);save();updateHud()}else toast('No hay nada cerca')}
function animate(){requestAnimationFrame(animate);let dt=clock.getDelta(),t=clock.elapsedTime,sp=t<specialUntil?6:3.2;player.position.x+=move.x*sp*dt;player.position.z+=move.z*sp*dt;if(move.x||move.z)player.rotation.y=Math.atan2(move.x,move.z);camera.position.lerp(new THREE.Vector3(player.position.x-6*Math.sin(player.rotation.y+.7),4.2,player.position.z-6*Math.cos(player.rotation.y+.7)),.08);camera.lookAt(player.position.x,1.2,player.position.z);scene.traverse(o=>{if(o.userData.dance){o.rotation.y+=dt*(.8+Math.sin(t)*.4);o.position.y=Math.abs(Math.sin(t*3+o.position.x))*0.08}});interactive.forEach(o=>o.rotation.y+=dt*.8);renderer.render(scene,camera)}
addEventListener('keydown',e=>{if(e.key==='w'||e.key==='ArrowUp')move.z=1;if(e.key==='s'||e.key==='ArrowDown')move.z=-1;if(e.key==='a'||e.key==='ArrowLeft')move.x=1;if(e.key==='d'||e.key==='ArrowRight')move.x=-1;if(e.key==='e')collect();if(e.key==='q'){specialUntil=clock.elapsedTime+4;toast('Especial')}});addEventListener('keyup',e=>{if(['w','s','ArrowUp','ArrowDown'].includes(e.key))move.z=0;if(['a','d','ArrowLeft','ArrowRight'].includes(e.key))move.x=0});$('open').onclick=collect;$('jump').onclick=()=>toast('Salto');$('special').onclick=()=>{specialUntil=clock.elapsedTime+4;toast('Especial activado')};$('map').onclick=()=>toast('Mapa: barra, escenario, chillout, camping, embarque');$('inv').onclick=()=>toast('Recogidos: '+collected.length+'/'+items.length);$('pause').onclick=()=>setScreen('select');let active=false,joy=$('joy'),kn=$('knob');joy.onpointerdown=e=>{active=true;joy.setPointerCapture(e.pointerId)};joy.onpointermove=e=>{if(!active)return;let r=joy.getBoundingClientRect(),dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2),l=Math.min(45,Math.hypot(dx,dy)),a=Math.atan2(dy,dx);kn.style.transform=`translate(${Math.cos(a)*l}px,${Math.sin(a)*l}px)`;move.x=-Math.cos(a)*l/45;move.z=-Math.sin(a)*l/45};joy.onpointerup=()=>{active=false;move.x=move.z=0;kn.style.transform='translate(0,0)'};addEventListener('resize',()=>{if(!renderer)return;camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});setScreen('home');
</script></body></html>
