<!doctype html><html lang=es><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>La Isla 3D</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#062f35;color:#f5ead2;font-family:Arial}button{border:0;border-radius:18px;padding:12px 18px;margin:6px;background:#ef7435;color:#062f35;font-weight:900}#ui,#sel{position:fixed;inset:0;z-index:4;display:grid;place-items:center;background:#062f35ee}.box{max-width:1000px;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.c{background:#ffffff12;border:1px solid #ffffff26;border-radius:18px;padding:15px}#hud{position:fixed;inset:0;z-index:3;pointer-events:none}#hud>*{pointer-events:auto}#p,#m,#r{position:absolute;background:#05282dcc;border:1px solid #ffffff33;border-radius:16px;padding:10px}#p{top:10px;left:10px}#m{top:10px;left:50%;transform:translateX(-50%)}#r{right:10px;bottom:10px}#toast{position:fixed;left:50%;bottom:140px;transform:translateX(-50%);background:#f5ead2;color:#062f35;padding:10px 16px;border-radius:999px;display:none;z-index:9}canvas{display:block}h1{font:70px Georgia;margin:0}</style><script type=importmap>{"imports":{"three":"https://esm.sh/three@0.160.0","three/addons/":"https://esm.sh/three@0.160.0/examples/jsm/"}}</script><body><div id=app></div><section id=ui><div class=box><h1>LA ISLA 3D</h1><p>Personajes humanos 3D, música, barra, pista, chillout, water, camping, barca, DJs, pole dance y recuerdos.</p><button onclick="showSel()">Nueva partida</button><button onclick="sound()">Música</button></div></section><section id=sel style=display:none><div class=box><h2>Elige personaje humano 3D</h2><div id=cards class=grid></div></div></section><div id=hud style=display:none><div id=p></div><div id=m>Recoge recuerdos y encuentra la llave del water<br><span id=pr>0/8</span></div><div id=r><button onclick="take()">Abrir / recoger</button><button onclick="special()">Especial</button><button onclick="showSel()">Cambiar</button></div></div><div id=toast></div><script type=module>import*as T from'three';import{GLTFLoader as L}from'three/addons/loaders/GLTFLoader.js';let scene,camera,ren,player,clock,sel='lala',keys={},things=[],got=[],ctx,cache={},base='https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/';let C=[['lala','Lala','mujer','Michelle.glb',0xef7435,0x19a0a3],['lety','Lety','mujer','kira.glb',0x0b5964,0xf5ead2],['isa','Isa','mujer','Michelle.glb',0x2f8f83,0xffd166],['patri','Patri','mujer','kira.glb',0xc94f7c,0xffd9ec],['luis','Luis','hombre','Soldier.glb',0x3568a8,0xffc16b],['fran','Fran','hombre','readyplayer.me.glb',0x4f6b52,0xd8e5b6],['clara','Clara','mujer','Michelle.glb',0x8d5dd6,0xf3dcff],['jesucristo','Jesucristo','hombre','readyplayer.me.glb',0x7c4a36,0xffd6b3],['aitor','Aitor','hombre','Soldier.glb',0xd14e2f,0xffe0bf]].map(a=>({id:a[0],n:a[1],sex:a[2],m:a[3],c:a[4],a:a[5]}));let I=[['papas','Papas revolconas',9,6],['llave','Llave water La Moraleja',-12,9],['carpeta','Carpeta rosa polvos mágicos',-6,7],['pistola','Pistola de agua',-3,10],['colchon','Colchón pinchado',-11,4],['barca','Barca',13,-10],['hamaca','Hamaca',-7,8],['pole','Pole dance',-5,-12]];function $(i){return document.getElementById(i)}function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',1700)}window.showSel=()=>{$('ui').style.display='none';$('sel').style.display='grid';$('hud').style.display='none'};C.forEach(x=>{let d=document.createElement('div');d.className='c';d.innerHTML='<b>'+x.n+'</b><br>'+x.sex+' · humano 3D<br><button>Jugar</button>';d.querySelector('button').onclick=()=>start(x.id);$('cards').appendChild(d)});function mat(c){return new T.MeshStandardMaterial({color:c,roughness:.6})}function label(t){let c=document.createElement('canvas');c.width=512;c.height=96;let x=c.getContext('2d');x.fillStyle='#05282ddd';x.roundRect(8,8,496,80,24);x.fill();x.fillStyle='#fff';x.font='bold 25px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(t,256,50);let s=new T.Sprite(new T.SpriteMaterial({map:new T.CanvasTexture(c),transparent:true}));s.scale.set(2.5,.5,1);return s}async function model(n){let u=base+n;if(cache[u])return cache[u].clone(true);let g=(await new L().loadAsync(u)).scene;cache[u]=g;return g.clone(true)}function fit(o){let b=new T.Box3().setFromObject(o),s=b.getSize(new T.Vector3()),k=2.1/Math.max(s.y,.01);o.scale.setScalar(k);b.setFromObject(o);let c=b.getCenter(new T.Vector3());o.position.set(-c.x,-b.min.y,-c.z);o.traverse(n=>{if(n.isMesh){n.castShadow=n.receiveShadow=true}})}function acc(o,x){let g=new T.Group(),a=mat(x.a),p=mat(x.c),hair=mat(0x2b1712),gold=mat(0xd8a94a);let add=(geo,m,xx,y,z)=>{let q=new T.Mesh(geo,m);q.position.set(xx,y,z);g.add(q);return q};if(x.id=='lala')for(let i=0;i<7;i++)add(new T.SphereGeometry(.05,12,8),i%2?a:gold,Math.sin(-.8+i*.27)*.43,2.08+Math.cos(-.8+i*.27)*.17,-.14);if(x.id=='lety')add(new T.BoxGeometry(.25,.22,.1),p,.25,.95,.12);if(x.id=='luis')add(new T.TorusGeometry(.31,.02,8,46,4.6),mat(0xf4e8a8),0,1.2,.09).rotation.z=.55;if(x.id=='jesucristo')for(let i=0;i<10;i++){let an=i/10*Math.PI*2;add(new T.CapsuleGeometry(.035,.45,4,8),hair,Math.cos(an)*.16,1.72,Math.sin(an)*.12-.02)}if(x.id=='aitor')add(new T.TorusGeometry(.25,.028,10,40,4),p,0,1.55,.03).rotation.z=-.42;o.add(g)}async function person(x,a,b,dance){try{let o=await model(x.m);fit(o);acc(o,x);o.position.set(a,0,b);o.rotation.y=Math.PI;o.userData.dance=dance;scene.add(o);return o}catch(e){toast('Falla modelo '+x.n)}}function prop(t,x,z,w=1,h=.5,d=1,c=0xef7435){let g=new T.Group(),m=new T.Mesh(new T.BoxGeometry(w,h,d),mat(c));m.position.y=h/2;g.add(m);let l=label(t);l.position.y=1.7;g.add(l);g.position.set(x,0,z);scene.add(g)}function item(i){let g=new T.Group(),m=new T.Mesh(new T.BoxGeometry(.45,.3,.45),mat(i[0]=='carpeta'?0xff8ccc:i[0]=='llave'?0xd8a94a:i[0]=='pistola'?0x28b8e8:0xef7435));m.position.y=.45;g.add(m);let l=label(i[1]);l.position.y=1.25;g.add(l);g.position.set(i[2],0,i[3]);g.userData={id:i[0],name:i[1]};things.push(g);scene.add(g)}function map(){let land=new T.Mesh(new T.CylinderGeometry(18,20,1,80),mat(0x2f5e31));land.position.y=-.52;land.scale.z=.72;scene.add(land);scene.add(new T.HemisphereLight(0xeaf7ff,0x315a33,1.2));let sun=new T.DirectionalLight(0xffffff,2);sun.position.set(6,12,6);scene.add(sun);let water=new T.Mesh(new T.PlaneGeometry(300,300),mat(0x176174));water.rotation.x=-Math.PI/2;water.position.y=-1.2;scene.add(water);prop('Barra + camareros',9,6,5,1,1,0x9a5d32);prop('Pista + gente bailando',0,-12,6,.7,2,0x111111);prop('DJ Bueno / DJ Malo',0,-15,5,1,1,0x111111);prop('Water La Moraleja',-12,9,1.4,1.8,1.2,0xf5ead2);prop('Zona chillout',-8,7,4,.35,3,0x134d53);prop('Tienda sin palos',-10,2,2,.7,2);prop('Colchón pinchado',-11,4,2,.12,1,0x77c9c8);prop('Barca',13,-10,2.4,.35,.8,0x8a4c2a);prop('Hamaca',-7,8,2,.12,.6,0xe8c574);prop('Fuente',6,-7,1,.8,1,0x8bd7ff);prop('Pole Dance',-5,-12,.25,2.7,.25,0xbfc0c2);prop('La loca del festival',3,-11,.45,1.8,.28,0xe8b998);I.forEach(item)}async function start(id){sel=id;$('sel').style.display='none';$('hud').style.display='block';if(!ctx)sound();scene=new T.Scene();scene.background=new T.Color(0x9ed7dc);camera=new T.PerspectiveCamera(60,innerWidth/innerHeight,.1,500);ren=new T.WebGLRenderer({antialias:true});ren.setSize(innerWidth,innerHeight);$('app').innerHTML='';$('app').appendChild(ren.domElement);clock=new T.Clock();map();player=new T.Group();scene.add(player);let c=C.find(x=>x.id==id);let me=await person(c,0,0,false);if(me){player.add(me);me.position.set(0,0,0)}for(let i=0;i<7;i++)await person(C[i],-3+i,-12+Math.sin(i)*.6,true);$('p').innerHTML='<b>'+c.n+'</b><br>'+c.sex+' · humano 3D';loop()}window.start=start;window.sound=()=>{if(ctx){ctx.close();ctx=null;return}ctx=new(AudioContext||webkitAudioContext)();let t=ctx.currentTime;(function beat(){if(!ctx)return;let o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=55;g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+.2);t+=.5;setTimeout(beat,500)})()};window.take=()=>{let n=things.filter(o=>!got.includes(o.userData.id)).sort((a,b)=>a.position.distanceTo(player.position)-b.position.distanceTo(player.position))[0];if(n&&n.position.distanceTo(player.position)<2.6){got.push(n.userData.id);n.visible=false;toast('Recogido: '+n.userData.name);$('pr').textContent=got.length+'/8'}else toast('No hay nada cerca')};window.special=()=>{toast('Especial activado');};addEventListener('keydown',e=>keys[e.key]=1);addEventListener('keyup',e=>keys[e.key]=0);function loop(){requestAnimationFrame(loop);let dt=clock.getDelta(),t=clock.elapsedTime,dx=(keys.a||keys.ArrowLeft?1:0)-(keys.d||keys.ArrowRight?1:0),dz=(keys.w||keys.ArrowUp?1:0)-(keys.s||keys.ArrowDown?1:0);player.position.x+=dx*3.5*dt;player.position.z+=dz*3.5*dt;if(dx||dz)player.rotation.y=Math.atan2(dx,dz);camera.position.lerp(new T.Vector3(player.position.x-6*Math.sin(player.rotation.y+.7),4,player.position.z-6*Math.cos(player.rotation.y+.7)),.08);camera.lookAt(player.position.x,1.2,player.position.z);scene.traverse(o=>{if(o.userData.dance){o.rotation.y+=dt;o.position.y=Math.abs(Math.sin(t*3+o.position.x))*.08}});ren.render(scene,camera)}setScreen('home');function setScreen(s){$('ui').style.display=s=='home'?'grid':'none'}</script></body></html>
