<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>La Isla 3D</title><style>html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;background:#062f35;color:#f5ead2;font-family:Arial}button{border:0;border-radius:999px;background:#ef7435;color:#062f35;font-weight:900;padding:12px 18px;margin:6px}canvas{display:block}.screen{position:fixed;inset:0;z-index:5;display:grid;place-items:center;background:linear-gradient(145deg,#062f35,#0b4b54)}.box{width:min(960px,92vw);padding:28px;border:1px solid #ffffff33;border-radius:28px;background:#05282ddd}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.card{background:#ffffff14;border:1px solid #ffffff26;border-radius:18px;padding:14px}.card b{font-size:26px}.panel{position:fixed;z-index:4;background:#05282dcc;border:1px solid #ffffff35;border-radius:16px;padding:10px 13px;backdrop-filter:blur(8px)}#who{top:12px;left:12px}#mis{top:12px;left:50%;transform:translateX(-50%);width:min(420px,58vw)}#act{right:12px;bottom:16px;display:flex;gap:8px}.bar{height:6px;background:#ffffff24;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:#ef7435}#joy{position:fixed;left:18px;bottom:18px;width:112px;height:112px;border-radius:50%;border:1px solid #ffffff55;background:#05282d99;z-index:4}#knob{position:absolute;left:34px;top:34px;width:44px;height:44px;border-radius:50%;background:#ef7435}#toast{display:none;position:fixed;left:50%;bottom:145px;transform:translateX(-50%);z-index:9;background:#f5ead2;color:#062f35;border-radius:999px;padding:11px 16px;font-weight:900}h1{font:76px Georgia;margin:0}@media(max-width:760px){#mis{top:86px;width:68vw;font-size:13px}#act{left:8px;right:8px;justify-content:center;bottom:130px}#act button{font-size:13px;padding:11px 12px}#who{font-size:13px;max-width:170px}#joy{width:100px;height:100px}#knob{left:30px;top:30px;width:40px;height:40px}}</style><script type="importmap">{"imports":{"three":"https://esm.sh/three@0.160.0"}}</script></head><body><div id="app"></div><section id="home" class="screen"><div class="box"><h1>LA ISLA 3D</h1><p>Versión estable: isla visible, personajes humanos 3D, objetos, música y controles móvil.</p><button id="new">Nueva partida</button><button id="mus">Música</button></div></section><section id="sel" class="screen" style="display:none"><div class="box"><h2>Elige personaje</h2><div id="cards" class="grid"></div></div></section><div id="hud" style="display:none"><div id="who" class="panel"></div><div id="mis" class="panel"><b>Recoge recuerdos y encuentra la llave del water</b><div class="bar"><i id="prog"></i></div><small id="cnt">0/8</small></div><div id="act" class="panel"><button id="take">Abrir / recoger</button><button id="sp">Especial</button><button id="chg">Cambiar</button></div><div id="joy"><span id="knob"></span></div></div><div id="toast"></div><script type="module">import*as T from'three';const $=i=>document.getElementById(i);let scene,camera,ren,clock,player,cur,keys={},joy={x:0,z:0},items=[],got=[],ctx,stopMusic=0,special=0;const chars=[['lala','Lala','mujer','Torbellino · baile pavo real',0x8a5639,0x17100c,0x19a0a3,0xef7435],['lety','Lety','mujer','Mi chillout, mis normas',0xc78b67,0x3a2419,0x0b5964,0xf5ead2],['isa','Isa','mujer','Llegó sábado y no perdió el tiempo',0xd6a17a,0x2b1811,0x2f8f83,0xffd166],['patri','Patri','mujer','Intensa y graciosísima',0xd4a07a,0x5a2a21,0xc94f7c,0xffd9ec],['luis','Luis','hombre','Malagueño vacilón',0xc98963,0x24140e,0x3568a8,0xffc16b],['fran','Fran','hombre','Calma y resurgir',0xca936e,0x2c1b13,0x4f6b52,0xd8e5b6],['clara','Clara','mujer','Dueña de la pista',0xd3a27d,0x3b2117,0x8d5dd6,0xf3dcff],['jesucristo','Jesucristo','hombre','Pelazo y buen rollo',0xc99572,0x20120c,0x7c4a36,0xffd6b3],['aitor','Aitor','hombre','Loquito desenjaulado',0xc48a67,0x2a1810,0xd14e2f,0xffe0bf]].map(a=>({id:a[0],n:a[1],sex:a[2],r:a[3],skin:a[4],hair:a[5],shirt:a[6],pants:a[7]}));const defs=[['papas','Papas revolconas',8.5,6,0xc96b28],['llave','Llave del water',-12,9,0xd8a94a],['carpeta','Carpeta rosa',-6,7,0xff8ccc],['pistola','Pistola de agua',-3,10,0x28b8e8],['colchon','Colchón pinchado',-11,4,0x77c9c8],['barca','Barca',13,-10,0x8a4c2a],['hamaca','Hamaca',-7,8,0xe8c574],['pole','Pole Dance',-5,-12,0xbfc0c2]];function toast(t){$('toast').textContent=t;$('toast').style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').style.display='none',1700)}function show(s){$('home').style.display=s==='home'?'grid':'none';$('sel').style.display=s==='sel'?'grid':'none';$('hud').style.display=s==='game'?'block':'none'}function m(c){return new T.MeshStandardMaterial({color:c,roughness:.6,metalness:.04})}function p(g,ma,x,y,z,rx=0,ry=0,rz=0){let o=new T.Mesh(g,ma);o.position.set(x,y,z);o.rotation.set(rx,ry,rz);o.castShadow=o.receiveShadow=true;return o}function human(c,npc=false){let g=new T.Group(),skin=m(c.skin),hair=m(c.hair),shirt=m(c.shirt),pants=m(c.pants),black=m(0x111111),female=c.sex==='mujer';g.add(p(new T.CapsuleGeometry(female?.27:.32,.72,8,18),shirt,0,1.12,0));g.add(p(new T.CapsuleGeometry(female?.25:.3,.28,8,16),pants,0,.68,0));for(let s of[-1,1]){g.add(p(new T.CapsuleGeometry(.08,.72,6,12),pants,s*.16,.28,0));g.add(p(new T.SphereGeometry(.1,12,8),black,s*.16,-.18,.04));g.add(p(new T.CapsuleGeometry(.06,.54,6,10),skin,s*(female?.34:.39),1.14,0,0,0,s*.22));g.add(p(new T.SphereGeometry(.07,10,8),skin,s*(female?.48:.55),.78,0))}g.add(p(new T.SphereGeometry(.23,24,18),skin,0,1.78,0));g.add(p(new T.SphereGeometry(.245,24,14,0,Math.PI*2,0,Math.PI*.7),hair,0,1.88,-.015));if(c.id==='jesucristo')for(let i=0;i<12;i++){let a=i/12*Math.PI*2;g.add(p(new T.CapsuleGeometry(.035,.62,5,10),hair,Math.cos(a)*.18,1.6,Math.sin(a)*.11-.03))}if(c.id==='lala')for(let i=0;i<7;i++){let a=-.8+i*.27;g.add(p(new T.SphereGeometry(.06,12,8),m(i%2?0x19a0a3:0xd8a94a),Math.sin(a)*.48,2.13+Math.cos(a)*.18,-.08))}if(c.id==='aitor')g.add(p(new T.TorusGeometry(.26,.03,10,42,4.1),shirt,0,1.5,.1,0,0,-.4));g.userData.dance=npc;g.scale.setScalar(npc?.82:1);return g}function label(t){let c=document.createElement('canvas');c.width=512;c.height=96;let x=c.getContext('2d');x.fillStyle='#05282ddd';x.roundRect(8,8,496,80,24);x.fill();x.fillStyle='#fff';x.font='bold 25px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(t,256,50);let s=new T.Sprite(new T.SpriteMaterial({map:new T.CanvasTexture(c),transparent:true}));s.scale.set(2.6,.5,1);return s}function prop(t,x,z,w,h,d,c){let g=new T.Group();g.add(p(new T.BoxGeometry(w,h,d),m(c),0,h/2,0));let l=label(t);l.position.y=h+1;g.add(l);g.position.set(x,0,z);scene.add(g);return g}function item(d){let g=new T.Group();let me=d[0]==='llave'?p(new T.TorusGeometry(.18,.035,8,24),m(d[4]),0,.55,0,Math.PI/2):p(new T.BoxGeometry(.5,.3,.5),m(d[4]),0,.45,0);g.add(me);g.add(label(d[1]));g.children[1].position.y=1.25;g.position.set(d[2],0,d[3]);g.userData={id:d[0],name:d[1]};items.push(g);scene.add(g)}function world(){scene.background=new T.Color(0x8fd0d8);scene.add(new T.HemisphereLight(0xeaf7ff,0x315a33,1.25));let sun=new T.DirectionalLight(0xffffff,2);sun.position.set(7,12,6);scene.add(sun);let water=p(new T.PlaneGeometry(300,300),m(0x176174),0,-1.05,0,-Math.PI/2);scene.add(water);let land=p(new T.CylinderGeometry(18,20,1,96),m(0x2f5e31),0,-.5,0);land.scale.z=.72;scene.add(land);let sand=p(new T.RingGeometry(12.4,20,96),m(0xd8bb7b),0,.04,0,-Math.PI/2);sand.scale.z=.72;scene.add(sand);prop('Barra + camareros + papas',8.8,6,5,1,1.2,0x9a5d32);prop('Pista + gente bailando',0,-12,6,.45,3,0x111111);prop('DJ Bueno / DJ Malo',0,-15,5,1.1,1.4,0x111111);prop('Water La Moraleja',-12,9,1.5,1.9,1.2,0xf5ead2);prop('Zona chillout',-8,7,4,.35,3,0x134d53);prop('Tienda sin palos',-10,2,2,.8,2,0xef7435);prop('Colchón pinchado',-11,4,2,.12,1,0x77c9c8);prop('Barca',13,-10,2.5,.35,.9,0x8a4c2a);prop('Hamaca',-7,8,2,.12,.65,0xe8c574);prop('Fuente',6,-7,1.2,.9,1.2,0x8bd7ff);prop('Pole Dance',-5,-12,.25,2.7,.25,0xbfc0c2);defs.forEach(item);for(let i=0;i<9;i++){let o=human(chars[i],true);o.position.set(-4+i,-11+Math.sin(i),0);scene.add(o)}let w1=human(chars[4],true);w1.position.set(7.5,0,6.7);scene.add(w1);let w2=human(chars[5],true);w2.position.set(10,0,6.7);scene.add(w2)}function start(id){cur=chars.find(c=>c.id===id);show('game');scene=new T.Scene();camera=new T.PerspectiveCamera(60,innerWidth/innerHeight,.1,500);ren=new T.WebGLRenderer({antialias:!matchMedia('(pointer:coarse)').matches});ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,1.2));app.innerHTML='';app.appendChild(ren.domElement);clock=new T.Clock();items=[];world();player=human(cur);scene.add(player);$('who').innerHTML='<b>'+cur.n+'</b><br>'+cur.sex+' · humano 3D<br><small>'+cur.r+'</small>';update();if(!ctx)music();loop()}function update(){$('cnt').textContent=got.length+'/'+defs.length;$('prog').style.width=got.length/defs.length*100+'%'}function take(){let n=items.filter(o=>!got.includes(o.userData.id)).sort((a,b)=>a.position.distanceTo(player.position)-b.position.distanceTo(player.position))[0];if(n&&n.position.distanceTo(player.position)<2.6){got.push(n.userData.id);n.visible=false;toast('Recogido: '+n.userData.name);update()}else toast('No hay nada cerca')}function loop(){requestAnimationFrame(loop);let dt=clock.getDelta(),t=clock.elapsedTime,dx=(keys.a||keys.ArrowLeft?1:0)-(keys.d||keys.ArrowRight?1:0)+joy.x,dz=(keys.w||keys.ArrowUp?1:0)-(keys.s||keys.ArrowDown?1:0)+joy.z;player.position.x+=dx*3.5*dt;player.position.z+=dz*3.5*dt;if(dx||dz)player.rotation.y=Math.atan2(dx,dz);camera.position.lerp(new T.Vector3(player.position.x-6*Math.sin(player.rotation.y+.65),4.1,player.position.z-6*Math.cos(player.rotation.y+.65)),.1);camera.lookAt(player.position.x,1.15,player.position.z);scene.traverse(o=>{if(o.userData&&o.userData.dance){o.rotation.y+=dt;o.position.y=Math.abs(Math.sin(t*3+o.position.x))*.08}});ren.render(scene,camera)}function music(){let A=AudioContext||webkitAudioContext;if(!A)return;ctx=new A();ctx.resume();let next=ctx.currentTime;function note(f,t,d,gain=.13){let o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(gain,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+d+.02)}function beat(){if(!ctx)return;[55,55,65,73].forEach((f,i)=>note(f,next+i*.25,.12,.24));[440,523,659,784,659,523,440,392].forEach((f,i)=>note(f,next+i*.125,.08,.055));next+=1;setTimeout(beat,900)}beat();toast('Música activada')}function musicToggle(){if(ctx){ctx.close();ctx=null;toast('Música parada')}else music()}$('new').onclick=()=>show('sel');$('mus').onclick=musicToggle;$('take').onclick=take;$('sp').onclick=()=>toast('Especial activado');$('chg').onclick=()=>show('sel');chars.forEach(c=>{let d=document.createElement('div');d.className='card';d.innerHTML='<b>'+c.n+'</b><small>'+c.sex+' · humano 3D</small><p>'+c.r+'</p><button>Jugar</button>';d.querySelector('button').onclick=()=>start(c.id);$('cards').appendChild(d)});addEventListener('keydown',e=>{keys[e.key]=1;if(e.key==='e')take()});addEventListener('keyup',e=>keys[e.key]=0);let active=false,joyEl=$('joy'),knob=$('knob');joyEl.onpointerdown=e=>{active=true;joyEl.setPointerCapture(e.pointerId)};joyEl.onpointermove=e=>{if(!active)return;let r=joyEl.getBoundingClientRect(),dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2),len=Math.min(40,Math.hypot(dx,dy)),a=Math.atan2(dy,dx);knob.style.transform='translate('+Math.cos(a)*len+'px,'+Math.sin(a)*len+'px)';joy.x=-Math.cos(a)*len/40;joy.z=-Math.sin(a)*len/40};joyEl.onpointerup=()=>{active=false;joy.x=joy.z=0;knob.style.transform='translate(0,0)'};addEventListener('resize',()=>{if(!ren)return;camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});show('home');</script></body></html>
